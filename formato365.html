<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA | Cargo Plan Master Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --excel-border: #d1d1d1; --excel-selected: #107c41; --header-bg: #f3f2f1; }
        body { margin: 0; background: #f3f2f1; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .excel-toolbar { background: white; border-bottom: 1px solid var(--excel-border); padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        .excel-viewport { flex: 1; overflow: auto; background: white; position: relative; }
        table { border-collapse: collapse; table-layout: fixed; width: max-content; }
        
        .col-A { width: 35px; } .col-B { width: 140px; } .col-C { width: 100px; } .col-D { width: 230px; } 
        .col-E { width: 150px; } .col-F { width: 130px; } .col-G { width: 110px; } .col-H { width: 130px; }
        .col-I { width: 100px; } .col-J { width: 110px; } .col-K { width: 130px; } .col-L { width: 220px; }
        .col-M { width: 130px; } .col-N { width: 130px; } .col-O { width: 110px; } .col-P { width: 260px; }

        td { border: 0.5px solid var(--excel-border); padding: 0 5px; font-size: 11px; outline: none; white-space: nowrap; vertical-align: middle; height: 25px; }
        td:focus { border: 2px solid var(--excel-selected) !important; background: #fff; z-index: 10; position: relative; }
        
        .row-label { background: var(--header-bg); text-align: center; color: #666; width: 35px; pointer-events: none; border-right: 1px solid #c0c0c0; }
        .col-label { background: var(--header-bg); text-align: center; color: #666; height: 22px; }
        .header-9 { font-weight: bold; text-align: center; background: #f8f9fa; border: 1px solid #000 !important; white-space: normal; line-height: 1.2; }
        
        .logo-box { position: absolute; top: 10px; left: 45px; background: #003366; color: white; padding: 5px 15px; font-weight: bold; font-size: 24px; z-index: 5; text-transform: uppercase; }
        .tabs-footer { background: #f3f2f1; border-top: 1px solid var(--excel-border); display: flex; height: 35px; overflow-x: auto; }
        .tab-item { padding: 5px 20px; background: white; border-right: 1px solid var(--excel-border); font-size: 11px; cursor: pointer; display: flex; align-items: center; white-space: nowrap; }
        .tab-item.active { border-bottom: 3px solid var(--excel-selected); color: var(--excel-selected); font-weight: bold; background: #fff; }
    </style>
</head>
<body>

<div class="excel-toolbar">
    <input type="text" id="txtSemana" class="form-control form-control-sm w-auto" placeholder="Semana">
    <select id="selEmpresa" class="form-select form-select-sm w-auto">
        <option value="">Cargando empresas...</option>
    </select>
    <button onclick="buscarDatos()" class="btn btn-sm btn-success fw-bold">CARGAR DATOS</button>
    <select id="selBuque" class="form-select form-select-sm w-auto" disabled onchange="cargarPuertos()"><option>Nave...</option></select>
    <select id="selPuerto" class="form-select form-select-sm w-auto" disabled onchange="generarTodo()"><option>Puerto...</option></select>
</div>

<div class="excel-viewport">
    <div class="logo-box" id="displayEmpresa">SISTEMA</div>
    <table id="excel-table">
        <thead><tr id="head-letters" class="col-label"></tr></thead>
        <tbody id="grid-body"></tbody>
    </table>
</div>

<div class="tabs-footer" id="tabs-bar"><div class="tab-item active">MASTER</div></div>

<script>
    const _supabase = supabase.createClient('https://vqxdmmtashwloobkhbva.supabase.co', 'sb_publishable_seniB_T4zCgrkooZ-Ow9aQ_znLUwvLC');
    const cols = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','Q','R'];
    let fullData = [];
    let masterMap = {}; 

    async function init() {
        const head = document.getElementById('head-letters');
        const body = document.getElementById('grid-body');
        head.innerHTML = `<td></td>` + cols.map(c => `<td class="col-${c}">${c}</td>`).join('');
        
        for (let i = 1; i <= 80; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="row-label">${i}</td>` + 
                cols.map(c => `<td id="cell-${i}-${c}" data-row="${i}" data-col="${c}" contenteditable="true" tabindex="0"></td>`).join('');
            body.appendChild(tr);
        }
        
        dibujarEsqueleto();
        setupNavigation();
        await cargarEmpresas(); // Llamada dinámica
    }

    // NUEVA FUNCIÓN: Consulta empresas únicas de la tabla reporte_daes
    async function cargarEmpresas() {
        const sel = document.getElementById('selEmpresa');
        try {
            const { data, error } = await _supabase
                .from('reporte_daes')
                .select('empresa');
            
            if (error) throw error;

            // Extraer nombres únicos y filtrar nulos
            const empresasUnicas = [...new Set(data.map(item => item.empresa))].filter(Boolean).sort();

            sel.innerHTML = '<option value="">Seleccione Empresa...</option>';
            empresasUnicas.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp;
                opt.innerText = emp;
                sel.appendChild(opt);
            });
        } catch (err) {
            console.error("Error cargando empresas:", err);
            sel.innerHTML = '<option value="">Error al cargar</option>';
        }
    }

    async function buscarDatos() {
        const sem = document.getElementById('txtSemana').value;
        const emp = document.getElementById('selEmpresa').value;
        if(!sem || !emp) return alert("Por favor seleccione SEMANA y EMPRESA");

        document.getElementById('displayEmpresa').innerText = emp;

        // 1. Obtener Contenedores por semana
        const { data: contenedores } = await _supabase.from('distribucion_diaria').select('*').eq('semana', sem);
        if (!contenedores || contenedores.length === 0) return alert("No hay datos para esta semana");

        // 2. Obtener DAEs filtrando por la EMPRESA seleccionada
        const bookings = [...new Set(contenedores.map(c => c.booking))].filter(Boolean);
        const { data: daes } = await _supabase
            .from('reporte_daes')
            .select('*')
            .in('booking', bookings)
            .eq('empresa', emp);

        masterMap = {};
        if (daes) {
            daes.forEach(d => {
                masterMap[d.booking.trim()] = {
                    dae: d.dae || '',
                    cliente: d.cliente || d.marca || '',
                    destino: d.puerto_destino || d.destino || ''
                };
            });
        }

        // Filtrar contenedores que SI tengan un booking asociado a esa empresa en reporte_daes
        fullData = contenedores.filter(c => masterMap[c.booking?.trim()]);

        if (fullData.length === 0) {
            alert("No se encontraron registros de " + emp + " en la semana " + sem);
            return;
        }

        const buques = [...new Set(fullData.map(d => d.vapor || d.barco || d.nave))].filter(Boolean);
        const sel = document.getElementById('selBuque');
        sel.innerHTML = '<option>Nave...</option>' + buques.map(b => `<option value="${b}">${b}</option>`).join('');
        sel.disabled = false;
        
        // Resetear puerto
        document.getElementById('selPuerto').disabled = true;
        document.getElementById('selPuerto').innerHTML = '<option>Puerto...</option>';
    }

    function cargarPuertos() {
        const buq = document.getElementById('selBuque').value;
        const puertos = [...new Set(fullData.filter(d => (d.vapor||d.barco||d.nave) === buq).map(d => d.terminal || d.puerto))].filter(Boolean);
        const sel = document.getElementById('selPuerto');
        sel.innerHTML = '<option>Puerto...</option>' + puertos.map(p => `<option value="${p}">${p}</option>`).join('');
        sel.disabled = false;
    }

    function generarTodo() {
        const buq = document.getElementById('selBuque').value;
        const pto = document.getElementById('selPuerto').value;
        const filtrado = fullData.filter(d => (d.vapor||d.barco||d.nave) === buq && (d.terminal||d.puerto) === pto);
        
        limpiarYTabular(filtrado, "MASTER");
        crearTabs(filtrado);
    }

    function limpiarYTabular(datos, nombreTab) {
        for(let r=1; r<=80; r++) { if(r !== 9) cols.forEach(c => setCelda(r, c, '')); }
        if(!datos.length) return;

        const infoM = masterMap[datos[0].booking?.trim()] || {};

        setCelda(5, 'B', 'VESSEL:', true); setCelda(5, 'C', document.getElementById('selBuque').value);
        setCelda(5, 'H', 'WEEK:', true);   setCelda(5, 'I', document.getElementById('txtSemana').value);
        setCelda(6, 'B', 'PORT:', true);   setCelda(6, 'C', document.getElementById('selPuerto').value);
        
        setCelda(5, 'K', 'CLIENT:', true); setCelda(5, 'L', nombreTab === "MASTER" ? "VARIOUS" : infoM.cliente);
        setCelda(8, 'K', 'DESTINATION:', true); setCelda(8, 'L', nombreTab === "MASTER" ? "VARIOUS" : infoM.destino);

        datos.forEach((reg, i) => {
            const r = 10 + i;
            const m = masterMap[reg.booking?.trim()] || {};
            setCelda(r, 'A', i + 1); 
            setCelda(r, 'B', reg.contenedor); 
            setCelda(r, 'C', reg.cajas);
            setCelda(r, 'D', m.dae || ""); 
            setCelda(r, 'E', reg.booking);
            setCelda(r, 'F', reg.sello_nav);      
            setCelda(r, 'G', reg.sello_vent);     
            setCelda(r, 'H', reg.sello_sticker);  
            setCelda(r, 'I', reg.sello_tci);      
            setCelda(r, 'J', reg.sello_sticker_nav); 
            setCelda(r, 'K', reg.termografo);
            setCelda(r, 'L', reg.marca);          
            setCelda(r, 'M', reg.observacion || "");
            setCelda(r, 'N', reg.fecha);
            setCelda(r, 'O', reg.codigo_productor);
            setCelda(r, 'P', reg.productor);
        });
    }

    function crearTabs(datos) {
        const bar = document.getElementById('tabs-bar');
        bar.innerHTML = '';
        const btnMaster = document.createElement('div');
        btnMaster.className = 'tab-item active';
        btnMaster.innerText = 'MASTER';
        btnMaster.onclick = () => { actualizarTabActiva(btnMaster); limpiarYTabular(datos, "MASTER"); };
        bar.appendChild(btnMaster);

        const grupos = {};
        datos.forEach(r => {
            const m = masterMap[r.booking?.trim()] || {};
            const key = `${m.cliente || "S/N"} | ${m.destino || "S/D"}`;
            if(!grupos[key]) grupos[key] = [];
            grupos[key].push(r);
        });

        Object.keys(grupos).forEach(k => {
            const div = document.createElement('div');
            div.className = 'tab-item';
            div.innerText = k;
            div.onclick = () => { actualizarTabActiva(div); limpiarYTabular(grupos[k], k); };
            bar.appendChild(div);
        });
    }

    function actualizarTabActiva(el) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function dibujarEsqueleto() {
        const h = ["N°","Container Number","Boxes","Dae","Booking","Naviera Seal","Verificador Seal","Adhesivo Seal","TCI Seal","Seguridad Seal","Thermograph","Brand / Client","Observations","Date","Code","Producer"];
        h.forEach((t, i) => { const el = document.getElementById(`cell-9-${cols[i]}`); if(el){ el.innerText=t; el.className='header-9'; } });
    }

    function setupNavigation() {
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            if (active.tagName !== 'TD') return;
            let r = parseInt(active.dataset.row), cIdx = cols.indexOf(active.dataset.col);
            if (e.key === 'ArrowRight' || e.key === 'Tab') { e.preventDefault(); focusCell(r, cols[cIdx + 1]); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); focusCell(r, cols[cIdx - 1]); }
            if (e.key === 'ArrowDown' || e.key === 'Enter') { e.preventDefault(); focusCell(r + 1, cols[cIdx]); }
            if (e.key === 'ArrowUp') { e.preventDefault(); focusCell(r - 1, cols[cIdx]); }
        });
    }

    function focusCell(r, c) { const el = document.getElementById(`cell-${r}-${c}`); if (el) el.focus(); }
    function setCelda(r, c, txt, b=false) { const el = document.getElementById(`cell-${r}-${c}`); if(el) { el.innerText = txt || ''; el.style.fontWeight = b ? 'bold' : 'normal'; } }

    window.onload = init;
</script>
</body>
</html>
