<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>COMERSUR | Gestión de Créditos TPG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --tpg-green: #107c41; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 25px; }
        .card-tpg { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .header-tpg { background: var(--tpg-green); color: white; border-radius: 15px 15px 0 0; padding: 20px; }
        .tpg-badge { background: #e7f3ed; color: var(--tpg-green); border: 1px solid var(--tpg-green); font-size: 0.75rem; font-weight: bold; padding: 2px 8px; border-radius: 10px; }
        .input-credito { border: 2px solid #ced4da; font-weight: 600; color: #333; }
        .input-credito:focus { border-color: var(--tpg-green); box-shadow: 0 0 0 0.2rem rgba(16, 124, 65, 0.25); }
        .btn-update { background-color: var(--tpg-green); border: none; font-weight: bold; transition: 0.3s; }
        .btn-update:hover { background-color: #0b5e31; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <div class="card card-tpg">
        <div class="header-tpg">
            <h3 class="mb-0">Control de Créditos TPG / INARPI</h3>
            <p class="small mb-0 opacity-75">Asignación de códigos para creación de AISV</p>
        </div>
        
        <div class="p-4">
            <div class="row g-3 mb-4 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold small text-muted">Semana de Gestión</label>
                    <input type="number" id="txtSemana" class="form-control" placeholder="Ej: 10">
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold small text-muted">Empresa (Filtro Dinámico)</label>
                    <select id="selEmpresa" class="form-select">
                        <option value="">Cargando empresas...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button onclick="buscarTerminalesTPG()" class="btn btn-primary w-100 fw-bold">Buscar Bookings en TPG</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Booking</th>
                            <th>DAE</th>
                            <th>Terminal</th>
                            <th style="width: 350px;">Código Crédito TPG</th>
                            <th class="text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <tr>
                            <td colspan="5" class="text-center py-4 text-muted">Seleccione los filtros para listar los registros de TPG/INARPI.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración de Supabase
    const _supabase = supabase.createClient('https://vqxdmmtashwloobkhbva.supabase.co', 'sb_publishable_seniB_T4zCgrkooZ-Ow9aQ_znLUwvLC');

    // Carga de empresas únicas al iniciar
    window.onload = async function() {
        const { data } = await _supabase.from('reporte_daes').select('empresa');
        const select = document.getElementById('selEmpresa');
        if (data) {
            const empresas = [...new Set(data.map(d => d.empresa))].filter(Boolean).sort();
            select.innerHTML = '<option value="">Seleccione Empresa...</option>' + 
                               empresas.map(e => `<option value="${e}">${e}</option>`).join('');
        }
    };

    async function buscarTerminalesTPG() {
        const sem = document.getElementById('txtSemana').value;
        const emp = document.getElementById('selEmpresa').value;
        const tbody = document.getElementById('cuerpoTabla');

        if(!sem || !emp) return alert("Por favor, ingrese Semana y seleccione Empresa.");

        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-success"></div></td></tr>';

        // Consulta filtrada por semana y empresa
        const { data, error } = await _supabase
            .from('reporte_daes')
            .select('*')
            .eq('semana', sem)
            .eq('empresa', emp);

        if (error) {
            alert("Error: " + error.message);
            return;
        }

        // Filtro para detectar TPG / INARPI / TPG-4 en la columna 'terminal'
        const filtrados = data.filter(d => {
            const t = (d.terminal || "").toUpperCase().replace(/\s+/g, '');
            return t.includes("TPG") || t.includes("INARPI");
        });

        tbody.innerHTML = '';

        if(filtrados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No se encontraron registros vinculados a TPG/INARPI.</td></tr>';
            return;
        }

        filtrados.forEach(reg => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="fw-bold text-primary">${reg.booking}</td>
                <td>${reg.dae || 'Pendiente'}</td>
                <td><span class="tpg-badge">${reg.terminal}</span></td>
                <td>
                    <input type="text" id="ipt-${reg.id}" class="form-control form-control-sm input-credito" 
                           value="${reg.credito_tpg || ''}" placeholder="Escriba código de crédito...">
                </td>
                <td class="text-center">
                    <button onclick="actualizarCredito(${reg.id})" class="btn btn-update btn-sm px-4 text-white">Guardar</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function actualizarCredito(id) {
        const nuevoValor = document.getElementById(`ipt-${id}`).value;
        
        const { error } = await _supabase
            .from('reporte_daes')
            .update({ credito_tpg: nuevoValor })
            .eq('id', id);

        if (error) {
            alert("Error al actualizar: " + error.message);
        } else {
            const input = document.getElementById(`ipt-${id}`);
            input.style.backgroundColor = "#d1e7dd"; // Color verde éxito temporal
            setTimeout(() => input.style.backgroundColor = "white", 1000);
        }
    }
</script>

</body>
</html>
