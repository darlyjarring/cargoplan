<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>COMERSUR | Gestión Crédito TPG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --tpg-color: #107c41; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); background: white; padding: 25px; }
        .tpg-header { color: var(--tpg-color); font-weight: bold; border-left: 5px solid var(--tpg-color); padding-left: 15px; margin-bottom: 25px; }
        .tpg-badge { background: var(--tpg-color); color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; }
        .input-credito { border: 2px solid #dee2e6; transition: all 0.3s; font-weight: 500; }
        .input-credito:focus { border-color: var(--tpg-color); box-shadow: 0 0 8px rgba(16, 124, 65, 0.2); }
        .btn-save { background-color: var(--tpg-color); border: none; color: white; font-weight: 600; }
        .btn-save:hover { background-color: #0b5e31; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="main-card">
        <h2 class="tpg-header">Asignación de Crédito TPG / INARPI</h2>
        
        <div class="row g-3 mb-4 align-items-end">
            <div class="col-md-2">
                <label class="form-label small fw-bold">Número de Semana</label>
                <input type="number" id="txtSemana" class="form-control" placeholder="Ej: 8">
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold">Empresa Exportadora</label>
                <select id="selEmpresa" class="form-select">
                    <option value="">Cargando empresas...</option>
                </select>
            </div>
            <div class="col-md-2">
                <button onclick="cargarDaesTPG()" class="btn btn-primary w-100 fw-bold">Consultar Terminales</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Booking / Reserva</th>
                        <th>DAE</th>
                        <th>Terminal Portuaria</th>
                        <th>Destino</th>
                        <th style="width: 300px;">Código de Crédito TPG</th>
                        <th class="text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="listaDaes">
                    <tr>
                        <td colspan="6" class="text-center text-muted">Seleccione los filtros para buscar información.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://vqxdmmtashwloobkhbva.supabase.co', 'sb_publishable_seniB_T4zCgrkooZ-Ow9aQ_znLUwvLC');

    // Al cargar la página, obtener las empresas de la base de datos
    window.onload = async function() {
        const { data, error } = await _supabase
            .from('reporte_daes')
            .select('empresa');

        const select = document.getElementById('selEmpresa');
        
        if (error) {
            select.innerHTML = '<option value="">Error al cargar</option>';
            return;
        }

        // Obtener nombres únicos de empresas
        const empresasUnicas = [...new Set(data.map(item => item.empresa))].filter(Boolean).sort();
        
        select.innerHTML = '<option value="">Seleccione Empresa...</option>';
        empresasUnicas.forEach(emp => {
            const opt = document.createElement('option');
            opt.value = emp;
            opt.innerText = emp;
            select.appendChild(opt);
        });
    };

    async function cargarDaesTPG() {
        const sem = document.getElementById('txtSemana').value;
        const emp = document.getElementById('selEmpresa').value;
        const tbody = document.getElementById('listaDaes');
        
        if(!sem || !emp) return alert("Por favor complete Semana y Empresa");

        tbody.innerHTML = '<tr><td colspan="6" class="text-center"><div class="spinner-border text-success" role="status"></div><br>Buscando en TPG/INARPI...</td></tr>';

        const { data, error } = await _supabase
            .from('reporte_daes')
            .select('*')
            .eq('semana', sem)
            .eq('empresa', emp);

        if (error) {
            alert("Error: " + error.message);
            return;
        }

        const filtrados = data.filter(d => {
            const puerto = (d.puerto || "").toUpperCase();
            const puertoLimpio = puerto.replace(/\s+/g, '');
            return puertoLimpio.includes("TPG") || puertoLimpio.includes("INARPI") || puertoLimpio.includes("TPG-4");
        });

        tbody.innerHTML = '';

        if(filtrados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No se encontraron bookings para TPG/INARPI en esta selección.</td></tr>';
            return;
        }

        filtrados.forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="fw-bold">${d.booking}</td>
                <td>${d.dae || 'S/D'}</td>
                <td><span class="tpg-badge">${d.puerto}</span></td>
                <td class="small text-muted">${d.puerto_destino || d.destino || ''}</td>
                <td>
                    <input type="text" id="credito-${d.id}" class="form-control form-control-sm input-credito" 
                           value="${d.credito_tpg || ''}" placeholder="Ingrese código AISV...">
                </td>
                <td class="text-center">
                    <button onclick="guardarCredito(${d.id})" class="btn btn-save btn-sm px-4">Guardar</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function guardarCredito(id) {
        const valor = document.getElementById(`credito-${id}`).value;
        const btn = event.target;

        btn.disabled = true;
        btn.innerText = "Cargando...";

        const { error } = await _supabase
            .from('reporte_daes')
            .update({ credito_tpg: valor })
            .eq('id', id);

        if (error) {
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "Guardar";
        } else {
            const input = document.getElementById(`credito-${id}`);
            input.style.backgroundColor = "#d1e7dd";
            btn.innerText = "¡Guardado!";
            
            setTimeout(() => {
                input.style.backgroundColor = "white";
                btn.disabled = false;
                btn.innerText = "Guardar";
            }, 1500);
        }
    }
</script>

</body>
</html>
