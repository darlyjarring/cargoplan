<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA | Limpieza Total Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-danger { background-color: #d9534f; border: none; padding: 12px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-danger:hover { background-color: #a9221f; transform: scale(1.02); }
        .warning-text { color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; }
        .status-log { max-height: 250px; overflow-y: auto; background: #1e1e1e; color: #00ff41; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 12px; border: 1px solid #333; }
        .table-check { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <button class="btn btn-dark btn-sm mb-3" onclick="window.location.href='index.html'"><i class="bi bi-arrow-left"></i> VOLVER AL MENÚ</button>
            
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-exclamation-octagon-fill text-danger" style="font-size: 3.5rem;"></i>
                    <h3 class="fw-bold mt-2">Borrado Integral de Datos</h3>
                    <p class="text-muted small">Seleccione los parámetros para la limpieza profunda</p>
                </div>
                
                <div class="warning-text text-center">
                    <strong><i class="bi bi-shield-fill-exclamation"></i> OPERACIÓN IRREVERSIBLE</strong><br>
                    Se eliminarán registros en: <b>DAES, Distribución, Sabana y Reporte Final.</b>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Semana Operativa:</label>
                        <input type="number" id="numSemana" class="form-control border-primary" placeholder="Ej: 10">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Empresa Exportadora:</label>
                        <select id="selEmpresa" class="form-select border-primary">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                </div>

                <button onclick="confirmarBorrado()" class="btn btn-danger w-100 shadow">
                    <i class="bi bi-trash3-fill me-2"></i> EJECUTAR LIMPIEZA TOTAL
                </button>

                <div class="mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="small fw-bold text-secondary">CONSOLA DE DEPURACIÓN:</span>
                        <span class="table-check">Tablas: 4 vinculadas</span>
                    </div>
                    <div id="log" class="status-log">Esperando orden del administrador...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://vqxdmmtashwloobkhbva.supabase.co', 'sb_publishable_seniB_T4zCgrkooZ-Ow9aQ_znLUwvLC');

    async function cargarEmpresas() {
        try {
            const { data } = await _supabase.from('reporte_daes').select('empresa');
            const empresasUnicas = [...new Set(data.map(item => item.empresa))].filter(Boolean).sort();
            const sel = document.getElementById('selEmpresa');
            sel.innerHTML = '<option value="">Seleccione Empresa...</option>';
            empresasUnicas.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp;
                opt.innerText = emp;
                sel.appendChild(opt);
            });
        } catch (e) {
            document.getElementById('selEmpresa').innerHTML = '<option>Error al cargar</option>';
        }
    }

    async function confirmarBorrado() {
        const sem = document.getElementById('numSemana').value;
        const emp = document.getElementById('selEmpresa').value;

        if (!sem || !emp) {
            alert("❌ Error: Debe completar la Semana y la Empresa.");
            return;
        }

        const msg = `¿Está seguro de eliminar TODO lo relacionado a:\n\nSEMANA: ${sem}\nEMPRESA: ${emp}\n\nSe borrarán DAES, PLANIFICACIÓN, DISTRIBUCIÓN e INFORMES FINALES.`;
        
        if (confirm(msg)) {
            const finalCheck = confirm("Esta acción dejará las tablas vacías para estos filtros. ¿Proceder?");
            if (finalCheck) ejecutarBorrado(sem, emp);
        }
    }

    function addLog(msg, type = "info") {
        const log = document.getElementById('log');
        const colors = { info: "#00ff41", warn: "#ffc107", error: "#ff4d4d" };
        log.innerHTML += `<div style="color: ${colors[type]}">[${new Date().toLocaleTimeString()}] > ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function ejecutarBorrado(semana, empresa) {
        document.getElementById('log').innerHTML = ""; 
        addLog(`Iniciando secuencia de borrado...`, "warn");

        try {
            // 1. reporte_daes
            const { error: err1 } = await _supabase.from('reporte_daes').delete().eq('semana', semana).eq('empresa', empresa);
            if (err1) throw err1;
            addLog(`✓ Tabla 'reporte_daes' depurada.`);

            // 2. sabana_semanal (Añadida)
            // Se filtra por semana. Si tienes columna empresa, agregar .eq('empresa', empresa)
            const { error: err2 } = await _supabase.from('sabana_semanal').delete().eq('semana', semana);
            if (err2) throw err2;
            addLog(`✓ Tabla 'sabana_semanal' depurada.`);

            // 3. distribucion_diaria
            const { error: err3 } = await _supabase.from('distribucion_diaria').delete().eq('semana', semana);
            if (err3) throw err3;
            addLog(`✓ Tabla 'distribucion_diaria' depurada.`);

            // 4. informe_contenedores_final (Añadida)
            const { error: err4 } = await _supabase.from('informe_contenedores_final').delete().eq('semana', semana);
            if (err4) throw err4;
            addLog(`✓ Tabla 'informe_contenedores_final' depurada.`);

            addLog(`-----------------------------------------`, "info");
            addLog(`PROCESO FINALIZADO: Base de datos limpia.`, "info");
            alert(`Éxito: Datos de la Semana ${semana} (${empresa}) eliminados correctamente.`);
            
        } catch (err) {
            addLog(`ERROR CRÍTICO: ${err.message}`, "error");
            alert("Hubo un problema al borrar. Revise la consola de depuración.");
        }
    }

    window.onload = cargarEmpresas;
</script>

</body>
</html>
