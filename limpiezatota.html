<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA | Limpieza de Base de Datos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-danger { background-color: #d9534f; border: none; padding: 12px; font-weight: bold; font-size: 1.1rem; }
        .warning-text { color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .status-log { max-height: 200px; overflow-y: auto; background: #212529; color: #00ff00; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <button class="btn btn-dark btn-sm mb-3" onclick="window.location.href='index.html'"><i class="bi bi-arrow-left"></i> Volver al Menú</button>
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-trash3-fill text-danger" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold">Limpieza de Datos</h3>
                </div>
                
                <div class="warning-text">
                    <strong><i class="bi bi-exclamation-triangle-fill"></i> ¡CUIDADO!</strong> 
                    Esta acción eliminará todos los registros de la <b>Semana</b> y <b>Empresa</b> seleccionada en las tablas de DAES y Distribución Diaria.
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Número de Semana:</label>
                        <input type="number" id="numSemana" class="form-control" placeholder="Ej: 8">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Empresa:</label>
                        <select id="selEmpresa" class="form-select">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                </div>

                <button onclick="confirmarBorrado()" class="btn btn-danger w-100 mb-4">
                    ELIMINAR REGISTROS SELECCIONADOS
                </button>

                <div class="mt-2">
                    <p class="small fw-bold text-muted mb-1">Terminal de Actividad:</p>
                    <div id="log" class="status-log">Esperando parámetros...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://vqxdmmtashwloobkhbva.supabase.co', 'sb_publishable_seniB_T4zCgrkooZ-Ow9aQ_znLUwvLC');

    // Cargar empresas dinámicamente al iniciar
    async function cargarEmpresas() {
        const { data } = await _supabase.from('reporte_daes').select('empresa');
        const empresasUnicas = [...new Set(data.map(item => item.empresa))].filter(Boolean).sort();
        const sel = document.getElementById('selEmpresa');
        empresasUnicas.forEach(emp => {
            const opt = document.createElement('option');
            opt.value = emp;
            opt.innerText = emp;
            sel.appendChild(opt);
        });
    }

    async function confirmarBorrado() {
        const sem = document.getElementById('numSemana').value;
        const emp = document.getElementById('selEmpresa').value;

        if (!sem || !emp) {
            alert("⚠️ Debes indicar la SEMANA y la EMPRESA para continuar.");
            return;
        }

        const confirmacion = confirm(`⚠️ ACCIÓN CRÍTICA ⚠️\n\n¿Deseas borrar permanentemente los datos de la SEMANA ${sem} para ${emp}?\n\nEsto afectará a todas las tablas del sistema.`);
        
        if (confirmacion) {
            const segundaConfirmacion = confirm("¿Estás 100% seguro? No hay marcha atrás.");
            if (segundaConfirmacion) ejecutarBorrado(sem, emp);
        }
    }

    function addLog(msg, color = "#00ff00") {
        const log = document.getElementById('log');
        log.innerHTML += `<div style="color: ${color}">> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function ejecutarBorrado(semana, empresa) {
        document.getElementById('log').innerHTML = ""; // Limpiar log previo
        addLog(`Iniciando purga: SEM ${semana} | ${empresa}...`, "#ffc107");

        try {
            // 1. Borrar de reporte_daes (Filtrado estricto)
            const { error: errorDaes } = await _supabase
                .from('reporte_daes')
                .delete()
                .eq('semana', semana)
                .eq('empresa', empresa);

            if (errorDaes) throw errorDaes;
            addLog(`✓ Tabla 'reporte_daes' limpia para ${empresa}.`);

            // 2. Borrar de distribucion_diaria 
            // Buscamos los registros que coincidan con la semana y que NO tengan datos de otras empresas
            // Si en esta tabla usas la columna 'marca' o 'productor' para identificar la empresa, 
            // el filtro por semana asegura que limpies el Cargo Plan actual para resubirlo.
            const { error: errorDist } = await _supabase
                .from('distribucion_diaria')
                .delete()
                .eq('semana', semana);
                // Si tienes columna empresa en distribucion_diaria, añade: .eq('empresa', empresa)

            if (errorDist) throw errorDist;
            addLog(`✓ Tabla 'distribucion_diaria' limpia para la semana ${semana}.`);

            addLog(`---------------------------------------`);
            addLog(`SISTEMA DEPURADO CORRECTAMENTE.`, "#00ff00");
            alert(`ÉXITO: Se han eliminado los registros de la semana ${semana} (${empresa}).`);
            
        } catch (err) {
            console.error(err);
            addLog(`❌ ERROR EN PROCESO: ${err.message}`, "#ff4d4d");
            alert("Error crítico. Revisa el log de la terminal.");
        }
    }

    window.onload = cargarEmpresas;
</script>

</body>
</html>
