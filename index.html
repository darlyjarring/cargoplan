<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal | Cargo Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f9; }
        .navbar-custom { background: #1a237e; color: white; padding: 15px; }
        .menu-card { transition: 0.3s; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; padding: 35px; }
        .menu-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .icon-circle { width: 80px; height: 80px; background: #e8eaf6; color: #1a237e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 2.5rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="navbar-custom d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold"><i class="bi bi-grid-3x3-gap-fill me-2"></i> CARGO PLAN - MENÚ PRINCIPAL</h5>
    <div>
        <span id="userName" class="me-3 badge bg-light text-dark shadow-sm"></span>
        <button class="btn btn-outline-light btn-sm fw-bold" onclick="logout()">CERRAR SESIÓN</button>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4 justify-content-center">
        <div class="col-md-4 menu-item hidden" id="item_creditos">
            <div class="card menu-card h-100" onclick="window.location.href='creditotpg.html'">
                <div class="icon-circle"><i class="bi bi-bank"></i></div>
                <h5 class="fw-bold">CRÉDITOS TPG</h5>
                <p class="text-muted">Asignación de códigos AISV para terminales.</p>
            </div>
        </div>

        <div class="col-md-4 menu-item hidden" id="item_ingresos">
            <div class="card menu-card h-100" onclick="window.location.href='gestion.html'">
                <div class="icon-circle"><i class="bi bi-truck"></i></div>
                <h5 class="fw-bold">GESTIÓN CARGA</h5>
                <p class="text-muted">Ingreso operativo de contenedores y sellos.</p>
            </div>
        </div>

        <div class="col-md-4 menu-item hidden" id="item_consultas">
            <div class="card menu-card h-100" onclick="window.location.href='consultas_ingresos.html'">
                <div class="icon-circle"><i class="bi bi-search"></i></div>
                <h5 class="fw-bold">CONSULTAS</h5>
                <p class="text-muted">Búsqueda y visualización de registros.</p>
            </div>
        </div>

        <div class="col-md-4 menu-item hidden" id="item_config">
            <div class="card menu-card h-100 border border-info" onclick="window.location.href='login.html'">
                <div class="icon-circle" style="background: #fff3e0; color: #ef6c00;"><i class="bi bi-people-fill"></i></div>
                <h5 class="fw-bold text-dark">CONFIGURACIÓN</h5>
                <p class="text-muted">Gestión de usuarios y permisos del sistema.</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const userData = JSON.parse(localStorage.getItem('usuario_cargo_plan'));

        if (!userData) { window.location.href = "login.html"; return; }

        document.getElementById('userName').innerText = userData.usuario.toUpperCase();

        // Control de permisos
        const p = userData.permisos || {};
        if (p.creditos) document.getElementById('item_creditos').classList.remove('hidden');
        if (p.ingresos) document.getElementById('item_ingresos').classList.remove('hidden');
        if (p.consultas) document.getElementById('item_consultas').classList.remove('hidden');

        // Solo Admin ve botón de Configuración
        if (userData.rol === 'admin') {
            document.getElementById('item_config').classList.remove('hidden');
        }
    });

    function logout() {
        localStorage.removeItem('usuario_cargo_plan');
        window.location.href = "login.html";
    }
</script>
</body>
</html>
